<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> iHost</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1> iHost</h1>
    <p class="subtitle">Secure Downloads</p>
    <div id="files-list">
      <!-- File cards dynamically added here -->
    </div>
  </div>

  <script>
    // Load files from server
    async function loadFiles() {
      try {
        const res = await fetch('/api/list');
        const data = await res.json();
        const container = document.getElementById('files-list');

        data.files.forEach(file => {
          const ext = file.split('.').pop().toLowerCase();
          const card = document.createElement('div');
          card.className = 'card';

          // Choose icon
          let icon = '📄';
          if (ext === 'zip') icon = '📦';
          else if (ext === 'pdf') icon = '📄';
          else if (ext === 'mp3') icon = '🎵';
          else if (ext === 'jpg' || ext === 'png') icon = '🖼';

          // Card title
          const title = document.createElement('div');
          title.className = 'card-title';
          title.innerText = `${icon} ${file}`;
          card.appendChild(title);

          // Video preview for mp4/mov/webm
          if (ext === 'mp4' || ext === 'mov' || ext === 'webm') {
            const video = document.createElement('video');
            video.src = `/files/${file}`;
            video.controls = true;
            video.muted = true;
            video.loop = true;
            video.className = 'video-preview';
            card.appendChild(video);
          }

          // Click triggers hashed download link
          card.onclick = () => downloadFile(file);

          container.appendChild(card);
        });

      } catch (err) {
        console.error('Failed to load files', err);
        document.getElementById('files-list').innerText = "Failed to load files.";
      }
    }

    // Generate hashed download link
    async function downloadFile(file) {
      try {
        const res = await fetch(`/api/generate?file=${encodeURIComponent(file)}`);
        const data = await res.json();
        window.location.href = data.url; // redirect to hashed download
      } catch (err) {
        alert('Failed to generate download link.');
      }
    }

    loadFiles();
  </script>
</body>
</html>
