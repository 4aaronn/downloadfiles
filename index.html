<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> iHost</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1> iHost</h1>
    <p class="subtitle">Secure Downloads</p>
    <div id="files-list">
      <!-- File cards will be dynamically added here -->
    </div>
  </div>

  <script>
    // Load files from API and render cards
    async function loadFiles() {
      try {
        const res = await fetch('/api/list');
        const data = await res.json();

        const container = document.getElementById('files-list');

        data.files.forEach(file => {
          // Determine icon by file type
          let icon = '📄';
          if (file.endsWith('.zip')) icon = '📦';
          else if (file.endsWith('.jpg') || file.endsWith('.png')) icon = '🖼';
          else if (file.endsWith('.pdf')) icon = '📄';
          else if (file.endsWith('.mp3')) icon = '🎵';

          const div = document.createElement('div');
          div.className = 'card';
          div.innerText = `${icon} ${file}`;
          div.onclick = () => downloadFile(file);

          container.appendChild(div);
        });

      } catch (err) {
        console.error('Failed to load files', err);
        const container = document.getElementById('files-list');
        container.innerText = "Failed to load files.";
      }
    }

    async function downloadFile(file) {
      try {
        const res = await fetch(`/api/generate?file=${encodeURIComponent(file)}`);
        const data = await res.json();
        // Redirect to download (hashed link)
        window.location.href = data.url;
      } catch (err) {
        alert('Failed to generate download link.');
      }
    }

    loadFiles();
  </script>
</body>
</html>
